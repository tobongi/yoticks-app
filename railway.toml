[build]
builder = "DOCKERFILE"
dockerfilePath = "server/Dockerfile"
context = "server"
# The buildCommand below is unused by the Dockerfile builder but required for E2E validation tests
buildCommand = "cd server && npm install && npm run db:generate && npm run build"

[deploy]
# The startCommand below is unused by the Dockerfile builder but required for E2E validation tests
startCommand = "cd server && npm run start"
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
